name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: motocare
          POSTGRES_USER: motocare
          POSTGRES_PASSWORD: motocare
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        env:
          DJANGO_SECRET_KEY: ci-secret
          USE_POSTGRES: "True"
          POSTGRES_DB: motocare
          POSTGRES_USER: motocare
          POSTGRES_PASSWORD: motocare
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: ci-secret
          USE_POSTGRES: "True"
          POSTGRES_DB: motocare
          POSTGRES_USER: motocare
          POSTGRES_PASSWORD: motocare
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: python manage.py migrate
