version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: motocare
      POSTGRES_USER: motocare
      POSTGRES_PASSWORD: motocare
    volumes:
      - motocare_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - motocare_media:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-only-secret-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      USE_POSTGRES: "True"
      POSTGRES_DB: motocare
      POSTGRES_USER: motocare
      POSTGRES_PASSWORD: motocare
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

volumes:
  motocare_pg_data:
  motocare_media:
