{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card-glass" data-aos="fade-up">
    <div class="text-center mb-4">
      <i class="fa-solid fa-key" style="font-size:2rem; color:var(--ignition)"></i>
      <h3 class="mt-2" style="font-size:1.5rem;">Reset your password</h3>
      <p style="color:var(--chrome-dim); font-size:0.9rem;">Step 1 of 3 — tell us who you are.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Continue</button>
    </form>
    <div class="text-center mt-3" style="font-size:0.88rem;">
      <a href="{% url 'accounts:login' %}">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
