{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card-glass" data-aos="fade-up">
    <div class="text-center mb-4">
      <i class="fa-solid fa-gauge-high" style="font-size:2rem; color:var(--ignition)"></i>
      <h3 class="mt-2" style="font-size:1.5rem;">Welcome back</h3>
      <p style="color:var(--chrome-dim); font-size:0.9rem;">Log in to track your service or manage jobs.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Log In</button>
    </form>
    <div class="text-center mt-3" style="font-size:0.88rem;">
      <a href="{% url 'accounts:forgot_password' %}">Forgot password?</a>
      <span style="color:var(--chrome-dim);"> · </span>
      <a href="{% url 'accounts:register' %}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
