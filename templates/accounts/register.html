{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card-glass" data-aos="fade-up" style="max-width:520px;">
    <div class="text-center mb-4">
      <i class="fa-solid fa-motorcycle" style="font-size:2rem; color:var(--ignition)"></i>
      <h3 class="mt-2" style="font-size:1.5rem;">Create your account</h3>
      <p style="color:var(--chrome-dim); font-size:0.9rem;">Add your bike next, then book your first slot.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Create Account</button>
    </form>
    <div class="text-center mt-3" style="font-size:0.88rem;">
      Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
