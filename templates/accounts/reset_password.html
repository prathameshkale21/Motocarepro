{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card-glass" data-aos="fade-up">
    <h3 class="mb-1" style="font-size:1.4rem;">Set a new password</h3>
    <p style="color:var(--chrome-dim); font-size:0.9rem;" class="mb-3">Step 3 of 3 — choose a new password.</p>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Save Password</button>
    </form>
  </div>
</div>
{% endblock %}
