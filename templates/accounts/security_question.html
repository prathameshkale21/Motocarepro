{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card card-glass" data-aos="fade-up">
    <div class="text-center mb-4">
      <i class="fa-solid fa-shield-halved" style="font-size:2rem; color:var(--ignition)"></i>
      <h3 class="mt-2" style="font-size:1.5rem;">Verify it's you</h3>
      <p style="color:var(--chrome-dim); font-size:0.9rem;">Step 2 of 3 — answer your security question.</p>
    </div>
    <div class="card-glass mb-3" style="background:var(--surface-2); padding:16px;">
      <div style="color:#fff; font-family:var(--font-display); text-transform:none; letter-spacing:normal; font-size:1rem;">{{ question_label }}</div>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Verify Answer</button>
    </form>
    <div class="text-center mt-3" style="font-size:0.88rem;">
      <a href="{% url 'accounts:forgot_password' %}">Start over</a>
    </div>
  </div>
</div>
{% endblock %}
