{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<section class="section" style="padding-top:130px; max-width:640px; margin:0 auto;">
  <div class="card-glass" data-aos="fade-up">
    <h3 class="mb-4" style="font-size:1.5rem;">{{ title }}</h3>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-ignition w-100 mt-3">Save Bike</button>
    </form>
  </div>
</section>
{% endblock %}
