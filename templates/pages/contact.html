{% extends "base.html" %}
{% block content %}
<section class="section" style="padding-top:140px;">
  <div class="container-xl">
    <span class="eyebrow">Get in touch</span>
    <h1 class="mt-2 mb-5" style="font-size:2.4rem;">Talk to the workshop.</h1>
    <div class="row g-4">
      <div class="col-lg-5" data-aos="fade-right">
        <div class="card-glass">
          <h4 style="font-size:1.05rem;"><i class="fa-solid fa-phone me-2" style="color:var(--ignition-2)"></i>Call</h4>
          <p style="color:var(--chrome-dim);">+91 86239 50473</p>
          <hr style="border-color:var(--hairline)">
          <h4 style="font-size:1.05rem;"><i class="fa-solid fa-envelope me-2" style="color:var(--ignition-2)"></i>Email</h4>
          <p style="color:var(--chrome-dim);">Prathameshkale764@gmail.com</p>
          <hr style="border-color:var(--hairline)">
          <h4 style="font-size:1.05rem;"><i class="fa-brands fa-whatsapp me-2" style="color:var(--ignition-2)"></i>WhatsApp</h4>
          <p style="color:var(--chrome-dim);">+91 8623950473</p>
          <hr style="border-color:var(--hairline)">
          <h4 style="font-size:1.05rem;"><i class="fa-solid fa-clock me-2" style="color:var(--ignition-2)"></i>Hours</h4>
          <p style="color:var(--chrome-dim);">Mon – Sun, 09:00 – 06:30</p>
        </div>
      </div>
      <div class="col-lg-7" data-aos="fade-left">
        <div class="card-glass" style="padding:0; overflow:hidden;">
          <iframe title="MotoCare Pro location" src="https://www.google.com/maps?q=Pune,Maharashtra&output=embed" width="100%" height="380" style="border:0; filter: invert(90%) hue-rotate(180deg) contrast(90%);" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
